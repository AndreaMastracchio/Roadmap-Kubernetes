services:
  kubestudy-frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8080:3000"
    environment:
      - VITE_WATCH_USE_POLLING=${VITE_WATCH_USE_POLLING}
      - VITE_API_URL=${VITE_API_URL}
    command: >
      sh -c "
      echo '📦 Frontend avviato. Inizio installazione dipendenze...' &&
      npm install &&
      echo '✅ Dipendenze installate con successo!' &&
      echo '🧹 Pulizia cache di ottimizzazione Vite...' &&
      rm -rf node_modules/.vite &&
      echo '🚀 Avvio server di sviluppo Vite su http://localhost:8080...' &&
      npm run dev -- --host 0.0.0.0 --port 3000 --force"
    depends_on:
      kubestudy-backend:
        condition: service_started

  kubestudy-backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ${PROJECT_PUBLIC_PATH:-./project_public}:/project_public
      - ${PROJECT_PRIVATE_PATH:-./project_private}:/project_private
    ports:
      - "5005:5005"
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - PORT=${PORT}
      - NODE_ENV=${NODE_ENV}
    command: >
      sh -c "
      echo '📦 Backend avviato. Inizio installazione dipendenze...' &&
      npm install &&
      echo '✅ Dipendenze installate con successo!' &&
      echo '🚀 Avvio backend in modalità watch su http://localhost:5005...' &&
      npm run dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db_dev_data:
