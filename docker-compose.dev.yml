services:
  kubestudy-frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8080:3000"
    environment:
      - VITE_WATCH_USE_POLLING=true
    command: >
      sh -c "
      echo '📦 Frontend avviato. Inizio installazione dipendenze...' &&
      npm install &&
      echo '✅ Dipendenze installate con successo!' &&
      echo '🧹 Pulizia cache di ottimizzazione Vite...' &&
      rm -rf node_modules/.vite &&
      echo '🚀 Avvio server di sviluppo Vite su http://localhost:8080...' &&
      npm run dev -- --host 0.0.0.0 --port 3000 --force"
    depends_on:
      kubestudy-backend:
        condition: service_started

  kubestudy-backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./project_public:/project_public
    ports:
      - "5005:5005"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=kubeuser
      - MYSQL_PASSWORD=kubepassword
      - MYSQL_DATABASE=kubestudy
      - REDIS_HOST=redis
      - SESSION_SECRET=kube-dev-secret
    command: >
      sh -c "
      echo '📦 Backend avviato. Inizio installazione dipendenze...' &&
      npm install &&
      echo '✅ Dipendenze installate con successo!' &&
      echo '🚀 Avvio backend in modalità watch su http://localhost:5005...' &&
      npm run dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: kubestudy
      MYSQL_USER: kubeuser
      MYSQL_PASSWORD: kubepassword
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_dev_data:
