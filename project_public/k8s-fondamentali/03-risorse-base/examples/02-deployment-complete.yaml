# Deployment completo con RollingUpdate strategy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
  labels:
    app: webapp
  annotations:
    kubernetes.io/change-cause: "Initial deployment v1.0"
spec:
  # Numero di repliche
  replicas: 3
  
  # Selector per i Pod
  selector:
    matchLabels:
      app: webapp
      tier: frontend
  
  # Strategia di aggiornamento
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Max 1 Pod extra durante l'update
      maxUnavailable: 0  # Nessun Pod può essere non disponibile (zero downtime)
  
  # Numero minimo di secondi prima che un Pod sia considerato disponibile
  minReadySeconds: 10
  
  # Numero di revisioni da mantenere per rollback
  revisionHistoryLimit: 10
  
  # Template del Pod
  template:
    metadata:
      labels:
        app: webapp
        tier: frontend
        version: "1.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      
      containers:
      - name: webapp
        image: nginx:1.21-alpine
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        
        env:
        - name: ENV
          value: "production"
        
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
          readOnly: true
      
      volumes:
      - name: config
        configMap:
          name: nginx-config
      
      # Affinity per distribuire i Pod su nodi diversi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - webapp
              topologyKey: kubernetes.io/hostname
