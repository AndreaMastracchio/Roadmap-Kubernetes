# ConfigMap - dati non sensibili
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # Chiavi semplici
  database_host: "postgres-service"
  database_port: "5432"
  log_level: "info"
  
  # File completi
  app.properties: |
    server.port=8080
    server.host=0.0.0.0
    logging.level=INFO
    feature.new_ui=true
  
  nginx.conf: |
    server {
      listen 80;
      server_name localhost;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
    }

---
# Secret Opaque - generico
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
data:
  # Valori in base64
  database_password: cGFzc3dvcmQxMjM=  # password123
  api_key: YWJjZGVmZ2hpamtsbW5vcA==      # abcdefghijklmnop
stringData:
  # Valori in chiaro (vengono codificati automaticamente)
  smtp_password: "mySmtpPassword"

---
# Secret TLS - certificati
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi...  # Certificato in base64
  tls.key: LS0tLS1CRUdJTi...  # Chiave privata in base64

---
# Secret Docker Registry - credenziali registry privato
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3MiLCJhdXRoIjoiZFhObGNqcHdZWE56In19fQ==

---
# Pod che usa ConfigMap e Secret
apiVersion: v1
kind: Pod
metadata:
  name: app-with-config
spec:
  containers:
  - name: app
    image: myapp:1.0
    
    # ConfigMap come variabili d'ambiente
    env:
    - name: DB_HOST
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: database_host
    - name: DB_PORT
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: database_port
    
    # Secret come variabili d'ambiente
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: database_password
    
    # Importa tutte le chiavi da ConfigMap
    envFrom:
    - configMapRef:
        name: app-config
    - secretRef:
        name: app-secrets
    
    volumeMounts:
    # ConfigMap come file
    - name: config-volume
      mountPath: /etc/config
      readOnly: true
    # Secret come file
    - name: secret-volume
      mountPath: /etc/secrets
      readOnly: true
  
  volumes:
  - name: config-volume
    configMap:
      name: app-config
      items:
      - key: app.properties
        path: application.properties
  - name: secret-volume
    secret:
      secretName: app-secrets
      defaultMode: 0400  # Read-only per owner
  
  # ImagePullSecret per registry privato
  imagePullSecrets:
  - name: registry-credentials
