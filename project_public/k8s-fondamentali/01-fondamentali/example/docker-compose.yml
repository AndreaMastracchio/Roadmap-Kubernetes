version: '3.8'

services:
  go-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # Esempio di healthcheck a livello docker-compose
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Esempio di volume per dati persistenti (se necessario)
    # volumes:
    #   - app-data:/home/appuser/data
    # Esempio di tmpfs per dati temporanei in RAM
    tmpfs:
      - /tmp:rw,size=100m,mode=1777
    # Limiti di risorse (best practice per produzione)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

