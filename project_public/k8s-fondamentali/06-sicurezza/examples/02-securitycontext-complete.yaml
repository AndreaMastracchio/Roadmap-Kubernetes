# Pod con SecurityContext completo
apiVersion: v1
kind: Pod
metadata:
  name: secure-pod
spec:
  # Security context a livello di Pod
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile:
      type: RuntimeDefault
  
  containers:
  - name: app
    image: nginx:1.21-alpine
    
    # Security context a livello di container (override Pod)
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
        - ALL
        add:
        - NET_BIND_SERVICE  # Solo se serve bind su porte < 1024
      seccompProfile:
        type: RuntimeDefault
    
    volumeMounts:
    # tmpfs per /tmp (filesystem read-only)
    - name: tmp
      mountPath: /tmp
    - name: cache
      mountPath: /var/cache/nginx
    - name: run
      mountPath: /var/run
  
  volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}
  - name: run
    emptyDir: {}

---
# Pod Security Standards via labels
apiVersion: v1
kind: Namespace
metadata:
  name: restricted-namespace
  labels:
    # Enforce restricted policy
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    # Warn on baseline violations
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/warn-version: latest
    # Audit all
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
